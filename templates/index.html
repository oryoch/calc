<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初期費用計算</title>
  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #667eea, #764ba2);
      margin: 0;
      padding: 20px;
    }

    .box {
      max-width: 420px;
      margin: auto;
      background: #fff;
      padding: 25px;
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    label {
      font-size: 13px;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #667eea;
      color: #fff;
      font-size: 16px;
    }

    button:hover {
      background: #5a67d8;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      background: #f0f4ff;
      text-align: center;
    }

    .result strong {
      font-size: 18px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>初期費用シミュレーター</h2>

    <form method="POST">

      <label>家賃</label>
      <input name="yachin">

      <label>敷金（月数）</label>
      <input name="shikikin">

      <label>礼金（月数）</label>
      <input name="reikin">

      <label>保証料（%）</label>
      <input name="hoshou">

      <label>前家賃（月数）</label>
      <input name="mae">

      <label>仲介手数料</label>
      <select name="chukai">
        <option value="1">100%</option>
        <option value="2">80%</option>
        <option value="3">50%</option>
        <option value="4">22,000円</option>
      </select>

      <label>鍵交換代</label>
      <input name="kagi">

      <label>消毒費用</label>
      <input name="shoudoku">

      <label>クリーニング代</label>
      <input name="cleaning">

      <label>火災保険</label>
      <input name="hoken">

      <button type="submit">計算する</button>
    </form>

    {% if total %}
    <div class="result">
      <p>合計</p>
      <strong>{{ total }}円</strong>
      <p>手取り</p>
      <strong>{{ man }}万円</strong>
    </div>
    {% endif %}

  </div>
</body>
</html>
