<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>初期費用計算</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }
    .box {
      max-width: 400px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
    }
    input, select, button {
      width: 100%;
      padding: 10px;
      margin: 5px 0 15px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }
    button {
      background: #007bff;
      color: #fff;
      border: none;
    }
    button:hover {
      background: #0056b3;
    }
    .result {
      background: #e9f5ff;
      padding: 10px;
      border-radius: 5px;
      margin-top: 15px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h2>初期費用計算</h2>

    <form method="POST">
      家賃<input name="yachin">
      敷金<input name="shikikin">
      礼金<input name="reikin">
      保証料(%)<input name="hoshou">
      前家賃<input name="mae">

      仲介
      <select name="chukai">
        <option value="1">100%</option>
        <option value="2">80%</option>
        <option value="3">50%</option>
        <option value="4">22000円</option>
      </select>

      鍵<input name="kagi">
      消毒<input name="shoudoku">
      クリーニング<input name="cleaning">
      保険<input name="hoken">

      <button type="submit">計算する</button>
    </form>

    {% if total %}
    <div class="result">
      <p>合計：{{ total }}円</p>
      <p>手取り：{{ man }}万円</p>
    </div>
    {% endif %}
  </div>
</body>
</html>
